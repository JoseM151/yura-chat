<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANA | Inteligencia Empática</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header>
            <div class="avatar">S</div>
            <div class="header-info">
                <h1>SANA</h1>
                <div class="status">En línea</div>
            </div>
        </header>

        <main id="chat-history">
            <div class="message-wrapper ai">
                <div class="message">Hola, soy Sana. Tu espacio seguro para conversar. ¿Cómo te sientes el día de hoy?</div>
                <span class="time">Bienvenida</span>
            </div>
            <!-- Los mensajes se insertarán aquí -->
        </main>

        <!-- Typing Indicator (Jumping Dots) -->
        <div id="typing-indicator" class="typing" style="margin-left: 24px; margin-bottom: 10px;">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="input-area">
            <div class="input-container">
                <input type="text" id="message-input" placeholder="Cuéntame, te escucho..." autocomplete="off">
            </div>
            <button id="send-btn" aria-label="Enviar mensaje">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
